<ion-header class="ion-no-border">
  <ion-toolbar [color]="color ? color: 'primary'">
<ion-buttons  slot="start">

  <!-- === Cerra modal ===-->
  <ion-button (click)="dismissModal()" *ngIf="isModal">
    <ion-icon  name="close-circle-outline"></ion-icon>
    
  
  </ion-button>

 <!-- === back Button ===-->

  <ion-back-button *ngIf="backButton" [defaultHref]="backButton"></ion-back-button>
</ion-buttons>

    <ion-title *ngIf="title" [ngClass]="{'ion-text-center': centerTitle}">{{title}}</ion-title>
     <ion-title class="version" slot="end"  [ngClass]="{'ion-text-center': centerTitle}">V 1.02</ion-title>
    


  </ion-toolbar>
</ion-header>

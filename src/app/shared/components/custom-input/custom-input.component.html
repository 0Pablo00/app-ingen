<!-- ===== Input Regular ===== -->
<ion-item *ngIf="type !== 'textarea'" class="ion-margin-vertical" [class.readonly-item]="readonly">
  <ion-icon color="primary" *ngIf="icon" slot="start" [name]="icon"></ion-icon>
  <ion-label position="floating">{{label}}</ion-label>
  <ion-input 
    debounce="500" 
    [autocomplete]="autocomplete" 
    [type]="type" 
    [formControl]="control"
    [readonly]="readonly"
    [placeholder]="placeholder">
  </ion-input>
  <ion-buttons *ngIf="isPassword" slot="end">
    <ion-button (click)="showOrHidePassword()">
      <ion-icon [name]="hide ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
    </ion-button>
  </ion-buttons>
  <!-- Ícono de candado para campos readonly (opcional) -->
  <ion-icon 
    *ngIf="readonly && !isPassword" 
    name="lock-closed-outline" 
    slot="end" 
    color="medium"
    class="readonly-icon">
  </ion-icon>
</ion-item>

<!-- ===== Textarea ===== -->
<ion-item *ngIf="type == 'textarea'" class="ion-margin-vertical" [class.readonly-item]="readonly">
  <ion-label position="floating">{{label}}</ion-label>
  <ion-textarea 
    auto-grow="true" 
    [formControl]="control" 
    debounce="500"
    [readonly]="readonly"
    [placeholder]="placeholder">
  </ion-textarea>
  <!-- Ícono de candado para campos readonly -->
  <ion-icon 
    *ngIf="readonly" 
    name="lock-closed-outline" 
    slot="end" 
    color="medium"
    class="readonly-icon">
  </ion-icon>
</ion-item>
